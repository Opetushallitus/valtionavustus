# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: "3"

tasks:
  test:
    desc: Run tests
    cmd: ./run-tests.sh
  test:pw-ui:
    desc: Open playwright test UI
    cmd: npx playwright test --config=playwright/playwright.config.ts --project=Default --ui
  dev:
    desc: Run local environment
    cmd: ./start-local-env.sh
  setup:hakemus:
    desc: Seed a published avustushaku + open application form, print links for manual testing
    cmd: ./scripts/setup-manual-test.sh hakemus
  setup:muutoshakemus:
    desc: Seed an accepted hakemus with päätös sent + muutoshakemus link, print links
    cmd: ./scripts/setup-manual-test.sh muutoshakemus
  setup:yhteishanke-muutoshakemus:
    desc: Seed an accepted yhteishanke hakemus ready for osapuolimuutos, print links
    cmd: ./scripts/setup-manual-test.sh yhteishanke-muutoshakemus
  setup:paatos:
    desc: Seed an accepted haku with päätös + submitted loppuselvitys, print links
    cmd: ./scripts/setup-manual-test.sh paatos
