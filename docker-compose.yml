name: valtionavustus

services:
  va:
    extends:
      service: va-server
    hostname: va
    depends_on:
      db:
        condition: service_healthy
      fakesmtp:
        condition: service_started
      maksatuspalvelu:
        condition: service_started
      pagerduty:
        condition: service_started
      org-mock:
        condition: service_started
    environment:
      JAVA_TOOL_OPTIONS: '-Duser.timezone="Europe/Helsinki"'
      config: '/app/server/config/local.edn'
      configdefaults: '/app/server/config/defaults.edn'
      PAGERDUTY_API_ENDPOINT: 'http://pagerduty:8080/v2/enqueue'
      PAGERDUTY_ROUTING_KEY: '_not_used_on_local_dev_'
      PAYMENT_SERVICE_HOST: 'maksatuspalvelu'
      PAYMENT_SERVICE_HOST_KEY: 'ssh-rsa '
    healthcheck:
      test: ["CMD-SHELL", "curl http://localhost:8081/api/healthcheck"]

  va-server:
    build:
      context: .
      dockerfile: ./Dockerfile.va-app
      args:
        - REVISION
        - NODE_VERSION
    image: ${VA_SERVER_IMAGE-va-server:latest}
    pull_policy: missing
    volumes:
      - /dev/urandom:/dev/random
    logging:
      options:
        mode: 'non-blocking'

  db:
    image: postgres:18.4@sha256:29ee7bb30d804447dc9a91fd0d74322ae1dc3a4072cc6346f70a5ed6e783b565
    volumes:
      - ./scripts/postgres-docker/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    hostname: va-postgres
    ports:
      - '5432:5432'
    command: ["postgres", "-c", "log_statement=all", "-c", "log_line_prefix='%m [%p] {%x} '"]
    environment:
      POSTGRES_USER: 'va'
      POSTGRES_PASSWORD: 'va'
      PGDATA: '/tmp/'
      TZ: "Europe/Helsinki"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      options:
        mode: 'non-blocking'


  fakesmtp:
    build:
      context: .
      dockerfile: ./Dockerfile.rcs-fakesmtp
    hostname: fakesmtp
    volumes:
      - ./fakesmtp/mail:/var/mail
    logging:
      options:
        mode: 'non-blocking'

  pagerduty:
    image: mendhak/http-https-echo:40@sha256:d072446da821a767d05dc19fa5ab6a27b1150bfb5c6ecfaecf3a2e5f9812794c
    hostname: pagerduty
    environment:
      ECHO_BACK_TO_CLIENT: false

  org-mock:
    image: wiremock/wiremock:3.13.2@sha256:fd27e46090916e85326229e5102ee169ae729059f3374549615bd20a35fee1f2
    hostname: org-mock
    command:
      - "--port"
      - "8080"
      - "--root-dir"
      - "/home/wiremock"
      - "--global-response-templating"
    volumes:
      - ./playwright/fixtures/wiremock:/home/wiremock
    logging:
      options:
        mode: 'non-blocking'

  maksatuspalvelu:
    image: atmoz/sftp@sha256:0960390462a4441dbb63698d7c185b76a41ffcee7b78ff4adf275f3e66f9c475
    hostname: maksatuspalvelu
    volumes:
      - ./maksatuspalvelu/initialize-maksatuspalvelu.sh:/etc/sftp.d/initialize-maksatuspalvelu.sh
      - ./maksatuspalvelu/identity/ssh_host_ed25519_key:/etc/ssh/ssh_host_ed25519_key
      - ./maksatuspalvelu/identity/ssh_host_rsa_key:/etc/ssh/ssh_host_rsa_key
    command: demo:pass:1001:100
    logging:
      options:
        mode: 'non-blocking'
